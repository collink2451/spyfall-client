<div class="fixed bottom-4 inset-x-4 z-50 flex flex-col gap-2">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="flex items-start gap-3 rounded-lg px-4 py-3 shadow-lg text-sm text-text w-full"
      [class.bg-danger]="toast.type === 'error'"
      [class.bg-success]="toast.type === 'success'"
      [class.bg-surface-raised]="toast.type === 'info'"
    >
      <span class="flex-1">{{ toast.message }}</span>
      <button
        (click)="toastService.dismiss(toast.id)"
        class="text-text opacity-60 hover:opacity-100 cursor-pointer leading-none"
      >
        ✕
      </button>
    </div>
  }
</div>
